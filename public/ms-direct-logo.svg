<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 270" fill="none" overflow="visible" role="img" aria-label="MS Direct Group – Every order a fulfilled promise">
  <!-- "by" pink rotated box -->
  <g transform="rotate(-8, 66, 66)">
    <rect x="4" y="4" width="124" height="124" rx="8" fill="#D66878"/>
    <text x="66" y="92"
      font-family="Georgia,'Times New Roman',serif"
      font-style="italic"
      font-weight="700"
      font-size="74"
      fill="white"
      text-anchor="middle">by</text>
  </g>

  <!-- "ms" in dark navy -->
  <text x="142" y="132"
    font-family="'Arial','Helvetica Neue',Helvetica,sans-serif"
    font-weight="800"
    font-size="110"
    fill="#1D3461"
    letter-spacing="-2">ms</text>

  <!-- red dot -->
  <circle cx="320" cy="104" r="14" fill="#CC2E30"/>

  <!-- "direct" in dark navy -->
  <text x="336" y="132"
    font-family="'Arial','Helvetica Neue',Helvetica,sans-serif"
    font-weight="800"
    font-size="110"
    fill="#1D3461"
    letter-spacing="-2">direct</text>

  <!-- Tagline cyan bar -->
  <rect x="142" y="152" width="662" height="56" rx="2" fill="#29B3E8"/>
  <text x="162" y="190"
    font-family="'Arial','Helvetica Neue',Helvetica,sans-serif"
    font-weight="400"
    font-size="24"
    fill="white"
    letter-spacing="0.3">Every order a fulfilled promise</text>
</svg>
