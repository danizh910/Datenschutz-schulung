<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 270" fill="none" role="img" aria-label="MS Direct Group – Every order a fulfilled promise">
  <!-- "by" pink rotated box -->
  <g transform="rotate(-5, 65, 65)">
    <rect x="4" y="4" width="122" height="122" rx="8" fill="#D66878"/>
    <text x="65" y="90"
      font-family="Georgia,'Times New Roman',serif"
      font-style="italic"
      font-weight="700"
      font-size="72"
      fill="white"
      text-anchor="middle"
      dominant-baseline="auto">by</text>
  </g>

  <!-- "ms" in dark navy -->
  <text x="142" y="122"
    font-family="'Arial','Helvetica Neue',Helvetica,sans-serif"
    font-weight="800"
    font-size="104"
    fill="#1D3461"
    letter-spacing="-2">ms</text>

  <!-- red dot -->
  <circle cx="305" cy="100" r="13" fill="#CC2E30"/>

  <!-- "direct" in dark navy -->
  <text x="315" y="122"
    font-family="'Arial','Helvetica Neue',Helvetica,sans-serif"
    font-weight="800"
    font-size="104"
    fill="#1D3461"
    letter-spacing="-2">direct</text>

  <!-- Tagline cyan bar -->
  <rect x="142" y="140" width="372" height="56" rx="2" fill="#29B3E8"/>
  <text x="160" y="178"
    font-family="'Arial','Helvetica Neue',Helvetica,sans-serif"
    font-weight="400"
    font-size="23"
    fill="white"
    letter-spacing="0.2">Every order a fulfilled promise</text>
</svg>
